git:
  overrideGpg: true
  pagers:
    - pager: diff-so-fancy
      colorArg: always
gui:
  theme:
    activeBorderColor:
      - "#ff966c"
      - "bold"
    inactiveBorderColor:
      - "#589ed7"
    searchingActiveBorderColor:
      - "#ff966c"
      - "bold"
    optionsTextColor:
      - "#82aaff"
    selectedLineBgColor:
      - "#2d3f76"
    cherryPickedCommitFgColor:
      - "#82aaff"
    cherryPickedCommitBgColor:
      - "#c099ff"
    markedBaseCommitFgColor:
      - "#82aaff"
    markedBaseCommitBgColor:
      - "#ffc777"
    unstagedChangesColor:
      - "#c53b53"
    defaultFgColor:
      - "#c8d3f5"
  showCommandLog: false
  showBottomLine: false
  nerdFontsVersion: "3"
  showFileIcons: true
  spinner:
    frames:
      - "[#     ]"
      - "[##    ]"
      - "[###   ]"
      - "[####  ]"
      - "[##### ]"
      - "[ #####]"
      - "[  ####]"
      - "[   ###]"
      - "[    ##]"
      - "[     #]"
      - "[    ##]"
      - "[   ###]"
      - "[  ####]"
      - "[ #####]"
      - "[##### ]"
      - "[####  ]"
      - "[###   ]"
      - "[##    ]"
    rate: 50
