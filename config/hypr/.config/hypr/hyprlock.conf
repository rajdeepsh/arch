$font = JetBrainsMono Nerd Font
$font_size = 80

$red = rgb(ff757f)
$bg = rgb(222436)
$fg = rgb(c8d3f5)
$accent = rgb(ff966c)

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = false
    text_trim = true
    fractional_scaling = 2
    screencopy_mode = 0
    fail_timeout = 1000
}

animations {
    enabled = true
    bezier = liner, 1, 1, 0, 0
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 2, linear
    animation = inputFieldDots, 1, 2, linear
    animation = inputFieldWidth, 1, 2, linear
    animation = inputFieldColors, 1, 2, linear
    animation = inputFieldFade, 1, 2, linear
}

background {
    path = $HOME/Repositories/arch-dotfiles/assets/wallpapers/default.png
    color = $bg
    blur_passes = 3
}

input-field {
    size = 30%, 10%
    outline_thickness = 5

    dots_size = 0.4
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = 10

    outer_color = $accent
    inner_color = $bg
    font_color = $fg
    font_family = $font

    fade_on_empty = false
    fade_timeout = 2000
    placeholder_text = 󰌾 Password
    hide_input = false

    rounding = 0
    check_color = $accent
    fail_color = $red
    fail_text = 󰌾 Invalid
    capslock_color = $red
    numlock_color = $red
    bothlock_color = $red

    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}
